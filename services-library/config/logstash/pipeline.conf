# DevArch Logstash Pipeline Configuration

input {
  beats {
    port => 5044
  }

  tcp {
    port => 5000
    codec => json_lines
  }
}

filter {
  # Parse JSON logs
  if [message] =~ /^\{/ {
    json {
      source => "message"
      skip_on_invalid_json => true
    }
  }

  # Parse timestamps
  if [timestamp] {
    date {
      match => ["timestamp", "ISO8601"]
    }
  }

  # Tag logs by source service
  if [fields][service] {
    mutate {
      add_tag => ["%{[fields][service]}"]
    }
  }

  # Add devarch project label
  mutate {
    add_field => { "project" => "devarch" }
  }
}

output {
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    index => "devarch-logs-%{+YYYY.MM.dd}"
  }
}
