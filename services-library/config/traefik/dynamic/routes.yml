# DevArch Traefik Dynamic Routes

http:
  routers:
    example-app:
      rule: "PathPrefix(`/api`)"
      entryPoints: ["web"]
      service: example-app-svc

  services:
    example-app-svc:
      loadBalancer:
        servers:
          - url: "http://app:8080"
        healthCheck:
          path: /health
          interval: 10s
          timeout: 3s
