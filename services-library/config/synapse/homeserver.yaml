# DevArch Synapse (Matrix) Configuration

server_name: "devarch.local"
pid_file: /data/homeserver.pid

listeners:
  - port: 8008
    tls: false
    type: http
    x_forwarded: true
    bind_addresses: ["0.0.0.0"]
    resources:
      - names: [client, federation]
        compress: false

database:
  name: sqlite3
  args:
    database: /data/homeserver.db

log_config: "/data/devarch.local.log.config"
media_store_path: /data/media_store
registration_shared_secret: "devarch-synapse-registration-secret"
report_stats: false
macaroon_secret_key: "devarch-synapse-macaroon-secret"
form_secret: "devarch-synapse-form-secret"
signing_key_path: "/data/devarch.local.signing.key"

trusted_key_servers:
  - server_name: "matrix.org"

enable_registration: true
enable_registration_without_verification: true

suppress_key_server_warning: true
