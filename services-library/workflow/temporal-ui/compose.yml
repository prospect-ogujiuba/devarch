services:
  temporal-ui:
    image: temporalio/ui:2.34
    restart: unless-stopped
    ports:
    - 127.0.0.1:9930:8080
    environment:
      TEMPORAL_ADDRESS: temporal-server:7233
      TEMPORAL_CORS_ORIGINS: http://localhost:9930
    healthcheck:
      test:
      - CMD-SHELL
      - wget --spider -q http://localhost:8080/
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
    - microservices-net
    container_name: temporal-ui
networks:
  microservices-net:
    external: true
