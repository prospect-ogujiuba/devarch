services:
  airflow-webserver:
    image: apache/airflow:2.10
    restart: unless-stopped
    command: webserver
    ports:
    - 127.0.0.1:9900:8080
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://postgres:devarch@postgres:5432/airflow
      AIRFLOW__CORE__FERNET_KEY: 46BKJoQYlPPOexq0OhDZnIlNepKFf87WFwLbfzqDDho=
      AIRFLOW__WEBSERVER__SECRET_KEY: devarch-secret
      _AIRFLOW_WWW_USER_CREATE: 'true'
      _AIRFLOW_WWW_USER_USERNAME: admin
      _AIRFLOW_WWW_USER_PASSWORD: devarch
    volumes:
    - airflow_logs:/opt/airflow/logs
    healthcheck:
      test:
      - CMD-SHELL
      - curl -f http://localhost:8080/health
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
    - microservices-net
    container_name: airflow-webserver
volumes:
  airflow_logs: null
networks:
  microservices-net:
    external: true
