services:
  forgejo:
    image: codeberg.org/forgejo/forgejo:14.0
    restart: unless-stopped
    ports:
    - 127.0.0.1:9211:3000
    - 127.0.0.1:2223:22
    environment:
      FORGEJO__database__DB_TYPE: postgres
      FORGEJO__database__HOST: postgres:5432
      FORGEJO__database__NAME: forgejo
      FORGEJO__database__USER: postgres
      FORGEJO__database__PASSWD: devarch
    volumes:
    - forgejo_data:/data
    healthcheck:
      test:
      - CMD-SHELL
      - curl -f http://localhost:3000/api/healthz || exit 1
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
    - microservices-net
    container_name: forgejo
volumes:
  forgejo_data: null
networks:
  microservices-net:
    external: true
