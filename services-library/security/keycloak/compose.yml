services:
  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    restart: unless-stopped
    command: start-dev
    ports:
    - 127.0.0.1:9710:8080
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: postgres
      KC_DB_PASSWORD: devarch
      KC_HOSTNAME_STRICT: 'false'
      KC_HTTP_ENABLED: 'true'
      KC_HEALTH_ENABLED: 'true'
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: devarch
    volumes:
    - keycloak_data:/opt/keycloak/data
    depends_on:
    - postgres
    healthcheck:
      test:
      - CMD-SHELL
      - curl -f http://localhost:8080/health/ready || exit 1
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
    - microservices-net
    container_name: keycloak
volumes:
  keycloak_data: null
networks:
  microservices-net:
    external: true
