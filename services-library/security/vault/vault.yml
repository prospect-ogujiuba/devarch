services:
  vault:
    image: hashicorp/vault:1.18
    restart: unless-stopped
    command: server -dev
    ports:
    - 127.0.0.1:9700:8200
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: devarch-root-token
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
      VAULT_ADDR: http://0.0.0.0:8200
    volumes:
    - vault_data:/vault/data
    cap_add:
    - IPC_LOCK
    healthcheck:
      test:
      - CMD-SHELL
      - vault status || wget --spider -q http://localhost:8200/v1/sys/health
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
    - microservices-net
    x-devarch-config:
      config.hcl: /vault/config/config.hcl
    container_name: vault
volumes:
  vault_data: null
networks:
  microservices-net:
    external: true
