services:
  authentik-worker:
    image: ghcr.io/goauthentik/server:2025.12
    restart: unless-stopped
    command: worker
    environment:
      AUTHENTIK_SECRET_KEY: devarch-secret-key-change-me
      AUTHENTIK_REDIS__HOST: redis
      AUTHENTIK_POSTGRESQL__HOST: postgres
      AUTHENTIK_POSTGRESQL__USER: postgres
      AUTHENTIK_POSTGRESQL__NAME: authentik
      AUTHENTIK_POSTGRESQL__PASSWORD: devarch
    healthcheck:
      test: ["CMD-SHELL", "kill -0 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
    - microservices-net
    container_name: authentik-worker
networks:
  microservices-net:
    external: true
