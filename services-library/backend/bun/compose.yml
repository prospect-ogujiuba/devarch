services:
  bun:
    image: oven/bun:1.2
    ports:
    - 127.0.0.1:4020:3000
    - 127.0.0.1:4021:3001
    - 127.0.0.1:4022:5173
    working_dir: /app
    command: sh -c "bun install && bun run dev 2>/dev/null || sleep infinity"
    environment:
      BUN_ENV: development
    healthcheck:
      test:
      - CMD
      - sh
      - -c
      - wget --spider -q http://localhost:3000/ || exit 0
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    networks:
    - microservices-net
    container_name: bun
networks:
  microservices-net:
    external: true
