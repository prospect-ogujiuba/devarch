networks:
  microservices-net:
    external: true
services:
  zipkin:
    container_name: zipkin
    image: openzipkin/zipkin:3.4
    restart: unless-stopped
    environment:
      STORAGE_TYPE: mem
    ports:
      - "127.0.0.1:9412:9411"
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:9411/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - microservices-net
