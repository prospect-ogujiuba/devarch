services:
  deno:
    image: denoland/deno:2.1
    ports:
    - 127.0.0.1:4030:8000
    - 127.0.0.1:4031:8001
    - 127.0.0.1:4032:3000
    working_dir: /app
    command: sh -c "deno run --allow-all main.ts 2>/dev/null || sleep infinity"
    environment:
      DENO_ENV: development
    healthcheck:
      test:
      - CMD
      - sh
      - -c
      - wget --spider -q http://localhost:8000/ || exit 0
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    networks:
    - microservices-net
    container_name: deno
networks:
  microservices-net:
    external: true
