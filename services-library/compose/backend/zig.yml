services:
  zig:
    image: docker.io/euantorano/zig:0.13
    ports:
    - 127.0.0.1:4050:8080
    - 127.0.0.1:4051:8081
    working_dir: /app
    command: sh -c "zig build run 2>/dev/null || sleep infinity"
    healthcheck:
      test:
      - CMD
      - sh
      - -c
      - wget --spider -q http://localhost:8080/ || exit 0
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    networks:
    - microservices-net
    container_name: zig
networks:
  microservices-net:
    external: true
