services:
  dotnet:
    image: mcr.microsoft.com/dotnet/sdk:9.0
    ports:
    - 127.0.0.1:8600:5000
    - 127.0.0.1:8601:5001
    - 127.0.0.1:8602:5002
    - 127.0.0.1:8603:5003
    working_dir: /app
    command: sh -c "dotnet watch run 2>/dev/null || sleep infinity"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      DOTNET_USE_POLLING_FILE_WATCHER: 'true'
    healthcheck:
      test:
      - CMD
      - sh
      - -c
      - curl -f http://localhost:5000/ || exit 0
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    networks:
    - microservices-net
    container_name: dotnet
networks:
  microservices-net:
    external: true
