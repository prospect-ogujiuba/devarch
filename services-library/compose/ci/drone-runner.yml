services:
  drone-runner:
    image: drone/drone-runner-docker:1
    restart: unless-stopped
    ports:
    - 127.0.0.1:9611:3000
    environment:
      DRONE_RPC_PROTO: http
      DRONE_RPC_HOST: drone-server:80
      DRONE_RPC_SECRET: devarch-rpc-secret
      DRONE_RUNNER_CAPACITY: '2'
    healthcheck:
      test:
      - CMD-SHELL
      - wget --spider -q http://localhost:3000/healthz
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
    - microservices-net
    container_name: drone-runner
networks:
  microservices-net:
    external: true
