services:
  mattermost:
    image: mattermost/mattermost-team-edition:10.11
    restart: unless-stopped
    ports:
    - 127.0.0.1:10200:8065
    environment:
      MM_SQLSETTINGS_DRIVERNAME: postgres
      MM_SQLSETTINGS_DATASOURCE: postgres://postgres:devarch@postgres:5432/mattermost?sslmode=disable
      MM_SERVICESETTINGS_SITEURL: http://localhost:10200
    volumes:
    - mattermost_data:/mattermost/data
    - mattermost_config:/mattermost/config
    healthcheck:
      test:
      - CMD-SHELL
      - curl -f http://localhost:8065/api/v4/system/ping || exit 1
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
    - microservices-net
    container_name: mattermost
volumes:
  mattermost_data: null
  mattermost_config: null
networks:
  microservices-net:
    external: true
