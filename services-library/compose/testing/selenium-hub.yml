services:
  selenium-hub:
    image: selenium/hub:4.27
    restart: unless-stopped
    ports:
    - 127.0.0.1:10100:4444
    environment:
      GRID_MAX_SESSION: '5'
    healthcheck:
      test:
      - CMD-SHELL
      - wget --spider -q http://localhost:4444/wd/hub/status
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
    - microservices-net
    container_name: selenium-hub
networks:
  microservices-net:
    external: true
