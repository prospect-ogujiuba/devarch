networks:
  microservices-net:
    external: true
volumes:
  victoriametrics_data:
services:
  victoriametrics:
    container_name: victoriametrics
    image: victoriametrics/victoria-metrics:v1.108
    restart: unless-stopped
    ports:
      - "127.0.0.1:8428:8428"
    volumes:
      - victoriametrics_data:/victoria-metrics-data
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:8428/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - microservices-net
