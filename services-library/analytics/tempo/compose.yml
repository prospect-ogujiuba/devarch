networks:
  microservices-net:
    external: true
volumes:
  tempo_data:
services:
  tempo:
    container_name: tempo
    image: grafana/tempo:2.9
    restart: unless-stopped
    command: -config.file=/etc/tempo/tempo.yaml
    ports:
      - "127.0.0.1:3200:3200"
      - "127.0.0.1:4327:4317"
      - "127.0.0.1:4328:4318"
    volumes:
      - tempo_data:/var/tempo
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:3200/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    x-devarch-config:
      tempo-config.yml: /etc/tempo/tempo.yaml
    networks:
      - microservices-net
