networks:
  microservices-net:
    external: true
services:
  jaeger:
    container_name: jaeger
    image: jaegertracing/all-in-one:2.15
    restart: unless-stopped
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "127.0.0.1:16686:16686"
      - "127.0.0.1:14268:14268"
      - "127.0.0.1:4337:4317"
      - "127.0.0.1:4338:4318"
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:14269/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - microservices-net
