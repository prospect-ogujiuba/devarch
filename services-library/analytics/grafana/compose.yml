networks:
  microservices-net:
    external: true
volumes:
  grafana_data:
services:
  grafana:
    container_name: grafana
    image: grafana/grafana:12.3
    restart: unless-stopped
    user: "0"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: devarch
    ports:
      - "127.0.0.1:9001:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - microservices-net
