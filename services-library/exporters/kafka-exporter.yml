services:
  kafka-exporter:
    image: danielqsj/kafka-exporter:v1.9
    restart: unless-stopped
    ports:
    - 127.0.0.1:9308:9308
    command: --kafka.server=kafka:29092
    healthcheck:
      test:
      - CMD-SHELL
      - wget --spider -q http://localhost:9308/
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
    - microservices-net
    container_name: kafka-exporter
networks:
  microservices-net:
    external: true
