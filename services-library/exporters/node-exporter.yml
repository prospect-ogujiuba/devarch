services:
  node-exporter:
    image: prom/node-exporter:v1.9
    restart: unless-stopped
    ports:
    - 127.0.0.1:9101:9100
    healthcheck:
      test:
      - CMD-SHELL
      - wget --spider -q http://localhost:9100/
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
    - microservices-net
    container_name: node-exporter
networks:
  microservices-net:
    external: true
