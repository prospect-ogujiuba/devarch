services:
  memcached-exporter:
    image: prom/memcached-exporter:v0.15
    restart: unless-stopped
    ports:
    - 127.0.0.1:9150:9150
    command: --memcached.address=memcached:11211
    healthcheck:
      test:
      - CMD-SHELL
      - wget --spider -q http://localhost:9150/
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
    - microservices-net
    container_name: memcached-exporter
networks:
  microservices-net:
    external: true
