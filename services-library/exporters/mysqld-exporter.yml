services:
  mysqld-exporter:
    image: prom/mysqld-exporter:v0.16
    restart: unless-stopped
    ports:
    - 127.0.0.1:9104:9104
    environment:
      DATA_SOURCE_NAME: root:devarch@(mysql:3306)/
    healthcheck:
      test:
      - CMD-SHELL
      - wget --spider -q http://localhost:9104/
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
    - microservices-net
    container_name: mysqld-exporter
networks:
  microservices-net:
    external: true
