services:
  openl3:
    image: python:3.10-slim
    working_dir: /work
    volumes:
      - ../../../data/daw_agent/in:/work/in:rw
      - ../../../data/daw_agent/out:/work/out:rw
      - openl3_keras:/root/.keras:rw
      - openl3_cache:/root/.cache:rw
      - openl3_state:/work/state:rw
      - ./config/embed_all.py:/work/state/embed_all.py:ro
    environment:
      TZ: America/Toronto
      DAW_IN_DIR: /work/in
      DAW_OUT_DIR: /work/out
      OPENL3_CONTENT_TYPE: music
      OPENL3_INPUT_REPR: mel256
      OPENL3_EMBEDDING_SIZE: "6144"
      OPENL3_HOP_SIZE: "0.1"
      OPENL3_BATCH_SIZE: "8"
    command: >
      bash -lc '
        set -euo pipefail

        apt-get update -y >/dev/null
        apt-get install -y --no-install-recommends git ffmpeg libsndfile1 >/dev/null
        rm -rf /var/lib/apt/lists/*

        python -m pip install --no-cache-dir -U pip wheel setuptools >/dev/null
        python -m pip install --no-cache-dir
          "tensorflow-cpu>=2.10,<3"
          "openl3"
          "soundfile"
          "librosa"
          "numpy" >/dev/null

        echo "OpenL3 ready."
        echo "Run: docker compose exec openl3 python /work/state/embed_all.py"
        tail -f /dev/null
      '
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import openl3; print('ok')\" >/dev/null 2>&1"]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 60s
    restart: unless-stopped
    networks:
      - microservices-net
    container_name: openl3
    x-devarch-config:
      tool: openl3
      in_dir: /work/in
      out_dir: /work/out
      batch_cmd: "docker compose exec openl3 python /work/state/embed_all.py"

volumes:
  openl3_keras: null
  openl3_cache: null
  openl3_state: null

networks:
  microservices-net:
    external: true
