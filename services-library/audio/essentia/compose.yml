services:
  essentia:
    image: ghcr.io/mtg/essentia:latest
    working_dir: /work
    ports:
      - "127.0.0.1:8091:8091"
    volumes:
      - ../../../data/daw_agent/in:/work/in:rw
      - ../../../data/daw_agent/out:/work/out:rw
      - ../../../data/daw_agent/models:/work/models:rw
      - essentia_state:/work/state:rw
      - ./config/extract_all.sh:/work/state/extract_all.sh:ro
    environment:
      TZ: America/Toronto
      DAW_IN_DIR: /work/in
      DAW_OUT_DIR: /work/out
      DAW_MODELS_DIR: /work/models
    command: >
      bash -c '
        chmod +x /work/state/extract_all.sh;
        echo "Essentia ready.";
        echo "Run: podman exec essentia /work/state/extract_all.sh";
        tail -f /dev/null
      '
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "essentia_streaming_extractor_music --help >/dev/null 2>&1",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped
    networks:
      - microservices-net
    container_name: essentia

volumes:
  essentia_state: null

networks:
  microservices-net:
    external: true
