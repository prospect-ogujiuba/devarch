services:
  rocketchat:
    image: rocket.chat:7.9
    restart: unless-stopped
    ports:
    - 127.0.0.1:10210:3000
    environment:
      ROOT_URL: http://localhost:10210
      MONGO_URL: mongodb://root:devarch@mongodb:27017/rocketchat?authSource=admin
      MONGO_OPLOG_URL: mongodb://root:devarch@mongodb:27017/local?authSource=admin
    volumes:
    - rocketchat_data:/app/uploads
    healthcheck:
      test:
      - CMD-SHELL
      - curl -f http://localhost:3000/api/v1/info || exit 1
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
    - microservices-net
    container_name: rocketchat
volumes:
  rocketchat_data: null
networks:
  microservices-net:
    external: true
