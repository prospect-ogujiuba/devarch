services:
  nextcloud:
    image: nextcloud:32
    restart: unless-stopped
    ports:
    - 127.0.0.1:10220:80
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_DB: nextcloud
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: devarch
      NEXTCLOUD_ADMIN_USER: admin
      NEXTCLOUD_ADMIN_PASSWORD: devarch
    volumes:
    - nextcloud_data:/var/www/html
    healthcheck:
      test:
      - CMD-SHELL
      - curl -f http://localhost:80/status.php || exit 1
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
    - microservices-net
    container_name: nextcloud
volumes:
  nextcloud_data: null
networks:
  microservices-net:
    external: true
