services:
  element-web:
    image: vectorim/element-web:v1.11
    restart: unless-stopped
    ports:
    - 127.0.0.1:10240:80
    healthcheck:
      test:
      - CMD-SHELL
      - wget --spider -q http://localhost:80/ || exit 1
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
    - microservices-net
    container_name: element-web
networks:
  microservices-net:
    external: true
