services:
  langflow:
    image: langflowai/langflow:1.7
    restart: unless-stopped
    ports:
    - 127.0.0.1:7860:7860
    volumes:
    - langflow_data:/app/langflow
    healthcheck:
      test:
      - CMD-SHELL
      - curl -f http://localhost:7860/health || exit 1
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
    - microservices-net
    container_name: langflow
volumes:
  langflow_data: null
networks:
  microservices-net:
    external: true
