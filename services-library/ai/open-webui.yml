services:
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    restart: unless-stopped
    ports:
    - 127.0.0.1:3080:8080
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
      WEBUI_SECRET_KEY: devarch-secret
    volumes:
    - open_webui_data:/app/backend/data
    healthcheck:
      test:
      - CMD-SHELL
      - curl -f http://localhost:8080/ || exit 1
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
    - microservices-net
    container_name: open-webui
volumes:
  open_webui_data: null
networks:
  microservices-net:
    external: true
