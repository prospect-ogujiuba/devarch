services:
  qdrant:
    image: qdrant/qdrant:v1.16
    restart: unless-stopped
    ports:
    - 127.0.0.1:6333:6333
    - 127.0.0.1:6334:6334
    volumes:
    - qdrant_data:/qdrant/storage
    healthcheck:
      test:
      - CMD-SHELL
      - wget --spider -q http://localhost:6333/healthz
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
    - microservices-net
    container_name: qdrant
volumes:
  qdrant_data: null
networks:
  microservices-net:
    external: true
