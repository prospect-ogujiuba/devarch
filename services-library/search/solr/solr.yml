services:
  solr:
    image: solr:9
    restart: unless-stopped
    ports:
    - 127.0.0.1:8983:8983
    volumes:
    - solr_data:/var/solr
    healthcheck:
      test:
      - CMD-SHELL
      - curl -f http://localhost:8983/solr/admin/info/system
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
    - microservices-net
    container_name: solr
volumes:
  solr_data: null
networks:
  microservices-net:
    external: true
