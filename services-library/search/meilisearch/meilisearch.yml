services:
  meilisearch:
    image: getmeili/meilisearch:v1.12
    restart: unless-stopped
    ports:
    - 127.0.0.1:7700:7700
    environment:
      MEILI_ENV: development
      MEILI_MASTER_KEY: devarch-master-key
      MEILI_NO_ANALYTICS: 'true'
    volumes:
    - meilisearch_data:/meili_data
    healthcheck:
      test:
      - CMD-SHELL
      - curl -f http://localhost:7700/health
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
    - microservices-net
    container_name: meilisearch
volumes:
  meilisearch_data: null
networks:
  microservices-net:
    external: true
