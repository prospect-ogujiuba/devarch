services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.7.1
    restart: unless-stopped
    ports:
    - 127.0.0.1:2181:2181
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
    - zookeeper_data:/var/lib/zookeeper/data
    healthcheck:
      test:
      - CMD-SHELL
      - echo ruok | nc localhost 2181
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
    - microservices-net
    container_name: zookeeper
volumes:
  zookeeper_data: null
networks:
  microservices-net:
    external: true
