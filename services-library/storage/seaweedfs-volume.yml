services:
  seaweedfs-volume:
    image: chrislusf/seaweedfs:3.80
    restart: unless-stopped
    ports:
    - 127.0.0.1:9511:8080
    command: volume -mserver=seaweedfs-master:9333 -ip.bind=0.0.0.0 -port=8080
    depends_on:
      seaweedfs-master:
        condition: service_healthy
    volumes:
    - seaweedfs_volume_data:/data
    healthcheck:
      test:
      - CMD-SHELL
      - wget --spider -q http://localhost:8080/status
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
    - microservices-net
    container_name: seaweedfs-volume
volumes:
  seaweedfs_volume_data: null
networks:
  microservices-net:
    external: true
