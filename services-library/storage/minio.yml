services:
  minio:
    image: minio/minio:RELEASE.2025-10-15T17-29-55Z
    restart: unless-stopped
    ports:
    - 127.0.0.1:9500:9000
    - 127.0.0.1:9501:9001
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: devarch123
    volumes:
    - minio_data:/data
    healthcheck:
      test:
      - CMD-SHELL
      - mc ready local || curl -f http://localhost:9000/minio/health/live
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
    - microservices-net
    container_name: minio
volumes:
  minio_data: null
networks:
  microservices-net:
    external: true
