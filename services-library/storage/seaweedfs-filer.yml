services:
  seaweedfs-filer:
    image: chrislusf/seaweedfs:3.80
    restart: unless-stopped
    ports:
    - 127.0.0.1:9512:8888
    command: filer -master=seaweedfs-master:9333 -ip.bind=0.0.0.0
    depends_on:
      seaweedfs-master:
        condition: service_healthy
    volumes:
    - seaweedfs_filer_data:/data
    healthcheck:
      test:
      - CMD-SHELL
      - wget --spider -q http://localhost:8888/
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
    - microservices-net
    container_name: seaweedfs-filer
volumes:
  seaweedfs_filer_data: null
networks:
  microservices-net:
    external: true
