# DevArch Kong Declarative Configuration

_format_version: "3.0"
_transform: true

services:
  - name: example-app
    url: http://app:8080
    routes:
      - name: example-app-route
        paths: ["/api"]
        methods: ["GET", "POST", "PUT", "DELETE", "PATCH", "OPTIONS"]
        strip_path: false

plugins:
  - name: cors
    config:
      origins: ["*"]
      methods: ["GET", "POST", "PUT", "DELETE", "PATCH", "OPTIONS"]
      headers: ["Authorization", "Content-Type", "Accept"]
      credentials: true
      max_age: 3600

  - name: rate-limiting
    config:
      minute: 60
      policy: local

  - name: request-size-limiting
    config:
      allowed_payload_size: 10
      size_unit: megabytes
