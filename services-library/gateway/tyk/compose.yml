services:
  tyk:
    image: tykio/tyk-gateway:v5.7
    restart: unless-stopped
    ports:
    - 127.0.0.1:8081:8080
    environment:
      TYK_GW_SECRET: devarch-secret
    volumes:
    - tyk_data:/opt/tyk-gateway
    healthcheck:
      test:
      - CMD-SHELL
      - curl -f http://localhost:8080/hello
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
    - microservices-net
    x-devarch-config:
      tyk.conf: /opt/tyk-gateway/tyk.conf
    container_name: tyk
volumes:
  tyk_data: null
networks:
  microservices-net:
    external: true
