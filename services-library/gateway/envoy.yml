services:
  envoy:
    image: envoyproxy/envoy:v1.32-latest
    restart: unless-stopped
    ports:
    - 127.0.0.1:4003:10000
    - 127.0.0.1:4005:9901
    healthcheck:
      test:
      - CMD-SHELL
      - wget --spider -q http://localhost:9901/ready
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
    - microservices-net
    x-devarch-config:
      envoy.yaml: /etc/envoy/envoy.yaml
    container_name: envoy
networks:
  microservices-net:
    external: true
