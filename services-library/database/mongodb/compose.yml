services:
  mongodb:
    image: mongo:7
    restart: unless-stopped
    ports:
    - 127.0.0.1:8503:27017
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: devarch
    volumes:
    - mongodb_data:/data/db
    healthcheck:
      test:
      - CMD
      - mongosh
      - --eval
      - db.adminCommand('ping')
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
    - microservices-net
    container_name: mongodb
volumes:
  mongodb_data: null
networks:
  microservices-net:
    external: true
