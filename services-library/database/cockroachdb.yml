services:
  cockroachdb:
    image: cockroachdb/cockroach:v25.2
    restart: unless-stopped
    ports:
    - 127.0.0.1:26257:26257
    - 127.0.0.1:8508:8080
    command: start-single-node --insecure
    volumes:
    - cockroachdb_data:/cockroach/cockroach-data
    healthcheck:
      test:
      - CMD-SHELL
      - curl -f http://localhost:8080/health
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
    - microservices-net
    container_name: cockroachdb
volumes:
  cockroachdb_data: null
networks:
  microservices-net:
    external: true
