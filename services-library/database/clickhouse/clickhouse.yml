services:
  clickhouse:
    image: clickhouse/clickhouse-server:25.8
    restart: unless-stopped
    ports:
    - 127.0.0.1:8123:8123
    - 127.0.0.1:9000:9000
    environment:
      CLICKHOUSE_DB: devarch
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: devarch
    volumes:
    - clickhouse_data:/var/lib/clickhouse
    healthcheck:
      test:
      - CMD-SHELL
      - wget --spider -q http://localhost:8123/ping
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
    - microservices-net
    container_name: clickhouse
volumes:
  clickhouse_data: null
networks:
  microservices-net:
    external: true
