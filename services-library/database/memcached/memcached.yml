services:
  memcached:
    image: memcached:1-alpine
    restart: unless-stopped
    ports:
    - 127.0.0.1:11211:11211
    healthcheck:
      test:
      - CMD-SHELL
      - echo stats | nc localhost 11211
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
    - microservices-net
    container_name: memcached
networks:
  microservices-net:
    external: true
