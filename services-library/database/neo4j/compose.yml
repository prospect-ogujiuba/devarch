services:
  neo4j:
    image: neo4j:5
    restart: unless-stopped
    ports:
    - 127.0.0.1:7474:7474
    - 127.0.0.1:7687:7687
    environment:
      NEO4J_AUTH: neo4j/devarch123
    volumes:
    - neo4j_data:/data
    - neo4j_logs:/logs
    healthcheck:
      test:
      - CMD-SHELL
      - wget -q --spider http://localhost:7474 || exit 1
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s
    networks:
    - microservices-net
    container_name: neo4j
volumes:
  neo4j_data: null
  neo4j_logs: null
networks:
  microservices-net:
    external: true
