services:
  erpnext-backend:
    image: frappe/erpnext:v15
    restart: unless-stopped
    command: bench serve --port 8000
    environment:
      DB_HOST: mariadb
      DB_PORT: '3306'
      REDIS_CACHE: redis://redis:6379/0
      REDIS_QUEUE: redis://redis:6379/1
      REDIS_SOCKETIO: redis://redis:6379/2
    volumes:
    - erpnext_backend_sites:/home/frappe/frappe-bench/sites
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
    - microservices-net
    container_name: erpnext-backend
volumes:
  erpnext_backend_sites: null
networks:
  microservices-net:
    external: true
