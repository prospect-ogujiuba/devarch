services:
  erpnext-queue-short:
    image: frappe/erpnext:v15
    restart: unless-stopped
    command: bench worker --queue short
    environment:
      DB_HOST: mariadb
      REDIS_CACHE: redis://redis:6379/0
      REDIS_QUEUE: redis://redis:6379/1
    healthcheck:
      test: ["CMD-SHELL", "kill -0 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
    - microservices-net
    container_name: erpnext-queue-short
networks:
  microservices-net:
    external: true
