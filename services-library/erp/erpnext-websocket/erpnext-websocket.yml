services:
  erpnext-websocket:
    image: frappe/erpnext:v15
    restart: unless-stopped
    command: node /home/frappe/frappe-bench/apps/frappe/socketio.js
    environment:
      REDIS_SOCKETIO: redis://redis:6379/2
    healthcheck:
      test: ["CMD-SHELL", "kill -0 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
    - microservices-net
    container_name: erpnext-websocket
networks:
  microservices-net:
    external: true
