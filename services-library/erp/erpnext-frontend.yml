services:
  erpnext-frontend:
    image: frappe/erpnext:v15
    restart: unless-stopped
    ports:
    - 127.0.0.1:8900:8080
    environment:
      BACKEND: erpnext-backend:8000
      SOCKETIO: erpnext-websocket:9000
    volumes:
    - erpnext_sites:/home/frappe/frappe-bench/sites
    healthcheck:
      test:
      - CMD-SHELL
      - curl -f http://localhost:8080/ || exit 0
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
    - microservices-net
    container_name: erpnext-frontend
volumes:
  erpnext_sites: null
networks:
  microservices-net:
    external: true
