services:
  mailhog:
    image: mailhog/mailhog:v1.0.1
    restart: unless-stopped
    ports:
    - 127.0.0.1:8125:8025
    - 127.0.0.1:1025:1025
    healthcheck:
      test:
      - CMD-SHELL
      - wget --spider -q http://localhost:8025/ || exit 0
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
    - microservices-net
    container_name: mailhog
networks:
  microservices-net:
    external: true
