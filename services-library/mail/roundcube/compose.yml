services:
  roundcube:
    image: roundcube/roundcubemail:1.6
    restart: unless-stopped
    ports:
    - 127.0.0.1:8126:80
    environment:
      ROUNDCUBEMAIL_DEFAULT_HOST: mailpit
      ROUNDCUBEMAIL_SMTP_SERVER: mailpit
      ROUNDCUBEMAIL_SMTP_PORT: '1025'
    volumes:
    - roundcube_data:/var/roundcube/db
    healthcheck:
      test:
      - CMD-SHELL
      - curl -f http://localhost:80/ || exit 1
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
    - microservices-net
    container_name: roundcube
volumes:
  roundcube_data: null
networks:
  microservices-net:
    external: true
