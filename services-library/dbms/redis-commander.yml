services:
  redis-commander:
    image: rediscommander/redis-commander:0.8
    restart: unless-stopped
    ports:
    - 127.0.0.1:8088:8081
    environment:
      REDIS_HOSTS: local:redis:6379:0:devarch
    healthcheck:
      test:
      - CMD-SHELL
      - wget --spider -q http://localhost:8081/
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
    - microservices-net
    container_name: redis-commander
networks:
  microservices-net:
    external: true
