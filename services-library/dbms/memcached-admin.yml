services:
  memcached-admin:
    image: bastienm/phpmemcacheadmin:1.3
    restart: unless-stopped
    ports:
    - 127.0.0.1:8092:80
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:80/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
    - microservices-net
    container_name: memcached-admin
networks:
  microservices-net:
    external: true
