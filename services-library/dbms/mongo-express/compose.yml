services:
  mongo-express:
    image: mongo-express:1.0
    restart: unless-stopped
    ports:
    - 127.0.0.1:8084:8081
    environment:
      ME_CONFIG_MONGODB_SERVER: mongodb
      ME_CONFIG_MONGODB_ADMINUSERNAME: root
      ME_CONFIG_MONGODB_ADMINPASSWORD: devarch
      ME_CONFIG_BASICAUTH: 'false'
    healthcheck:
      test:
      - CMD-SHELL
      - wget --spider -q http://localhost:8081/
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
    - microservices-net
    container_name: mongo-express
networks:
  microservices-net:
    external: true
