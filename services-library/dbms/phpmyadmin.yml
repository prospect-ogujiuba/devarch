services:
  phpmyadmin:
    image: phpmyadmin:5
    restart: unless-stopped
    ports:
    - 127.0.0.1:8083:80
    environment:
      PMA_HOST: mysql
      PMA_PORT: '3306'
    healthcheck:
      test:
      - CMD-SHELL
      - curl -f http://localhost:80/
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
    - microservices-net
    container_name: phpmyadmin
networks:
  microservices-net:
    external: true
