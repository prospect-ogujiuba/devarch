services:
  adminer:
    image: adminer:4
    restart: unless-stopped
    ports:
    - 127.0.0.1:8082:8080
    environment:
      ADMINER_DEFAULT_SERVER: postgres
      ADMINER_DESIGN: pepa-linha-dark
    healthcheck:
      test:
      - CMD-SHELL
      - php -r '$c=@fsockopen("localhost",8080);if(!$c)exit(1);'
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
    - microservices-net
    container_name: adminer
networks:
  microservices-net:
    external: true
