services:
  pgadmin:
    image: dpage/pgadmin4:8.14
    restart: unless-stopped
    ports:
    - 127.0.0.1:8087:80
    volumes:
    - pgadmin_data:/var/lib/pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@devarch.test
      PGADMIN_DEFAULT_PASSWORD: devarch
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    healthcheck:
      test:
      - CMD-SHELL
      - wget --spider -q http://localhost:80/misc/ping
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
    - microservices-net
    container_name: pgadmin
volumes:
  pgadmin_data: null
networks:
  microservices-net:
    external: true
