services:
  dockge:
    image: louislam/dockge:1
    restart: unless-stopped
    ports:
    - 127.0.0.1:9008:5001
    environment:
      DOCKGE_STACKS_DIR: /opt/stacks
    volumes:
    - dockge_data:/app/data
    healthcheck:
      test:
      - CMD-SHELL
      - wget --spider -q http://localhost:5001/ || exit 0
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
    - microservices-net
    container_name: dockge
volumes:
  dockge_data: null
networks:
  microservices-net:
    external: true
