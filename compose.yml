networks:
  microservices-net:
  proxy-net:
    name: microservices-net
    external: true

volumes:
  devarch_pgdata:

services:
  devarch-db:
    container_name: devarch-db
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      - POSTGRES_USER=devarch
      - POSTGRES_PASSWORD=devarch
      - POSTGRES_DB=devarch
    volumes:
      - devarch_pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5433:5432"
    networks:
      - microservices-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U devarch"]
      interval: 10s
      timeout: 5s
      retries: 5

  devarch-api:
    container_name: devarch-api
    build:
      context: ./api
      dockerfile: Dockerfile
      target: dev
    restart: unless-stopped
    depends_on:
      devarch-db:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgres://devarch:devarch@devarch-db:5432/devarch?sslmode=disable
      - PORT=8080
      - DEVARCH_USE_SUDO=false
      - CONTAINER_HOST=unix:///run/podman/podman.sock
      - DEVARCH_API_KEY=${DEVARCH_API_KEY}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-}
      - SECURITY_MODE=${SECURITY_MODE:-}
      - PROJECT_ROOT=/app
      - HOST_PROJECT_ROOT=/home/priz/projects/devarch
      - WORKSPACE_ROOT=/workspace
    ports:
      - "127.0.0.1:8550:8080"
    volumes:
      - /run/user/1000/podman/podman.sock:/run/podman/podman.sock:ro
      - ./apps:/workspace/apps:ro
      - ./services-library:/workspace/services-library:ro
      - ./api:/app
      - ${HOME}/.devarch:/root/.devarch
    networks:
      - microservices-net
      - proxy-net
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  devarch-ai:
    container_name: devarch-ai
    build:
      context: ./ai
      dockerfile: Dockerfile
      target: dev
    restart: unless-stopped
    depends_on:
      devarch-api:
        condition: service_healthy
      devarch-db:
        condition: service_healthy
    environment:
      - PORT=8080
      - DEVARCH_API_URL=http://devarch-api:8080
      - DEVARCH_API_KEY=${DEVARCH_API_KEY}
      - DATABASE_URL=postgres://devarch:devarch@devarch-db:5432/devarch?sslmode=disable
      - LLM_NETWORK=devarch_microservices-net
      - EMBED_MODEL=nomic-embed-text
      - EMBED_PORT=11436
      - RAMALAMA_STORE=${HOME}/.local/share/ramalama
      - CONTAINER_HOST=unix:///run/podman/podman.sock
    ports:
      - "127.0.0.1:8551:8080"
    volumes:
      - /run/user/1000/podman/podman.sock:/run/podman/podman.sock:ro
      - ${HOME}/.local/share/ramalama:${HOME}/.local/share/ramalama
      - ./ai:/app
    networks:
      - microservices-net
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  devarch-app:
    container_name: devarch-app
    image: nginx:alpine
    restart: unless-stopped
    depends_on:
      devarch-api:
        condition: service_healthy
      devarch-ai:
        condition: service_healthy
    volumes:
      - ./dashboard/dist:/usr/share/nginx/html:ro
      - ./dashboard/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "127.0.0.1:5174:80"
    networks:
      - microservices-net
      - proxy-net
