services:
  postgres:
    image: postgres:18.2
    restart: unless-stopped
    ports:
      - 127.0.0.1:8502:5432
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: devarch
      POSTGRES_DB: compat
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U postgres
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - microservices-net
    container_name: compat-postgres
  redis:
    image: redis:8.6.0-alpine
    restart: unless-stopped
    ports:
      - 127.0.0.1:8504:6379
    command: redis-server --requirepass devarch
    volumes:
      - redis_data:/data
    healthcheck:
      test:
        - CMD
        - redis-cli
        - -a
        - devarch
        - ping
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - microservices-net
    container_name: compat-redis
volumes:
  postgres_data: null
  redis_data: null
networks:
  microservices-net:
    external: true
