root = "."
tmp_dir = "tmp"

[build]
  bin = "./tmp/devarch-ai"
  cmd = "go build -o ./tmp/devarch-ai ./cmd/server"
  delay = 1000
  exclude_dir = ["tmp"]
  exclude_regex = ["_test\\.go$"]
  include_ext = ["go"]
  kill_delay = "0s"
  send_interrupt = false
  stop_on_error = true

[log]
  time = false

[misc]
  clean_on_exit = true
