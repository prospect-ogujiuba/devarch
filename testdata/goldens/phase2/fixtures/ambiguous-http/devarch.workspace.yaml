apiVersion: devarch.io/v2alpha1
kind: Workspace
metadata:
  name: ambiguous-http
  displayName: Ambiguous HTTP
  description: Fixture with two enabled http providers and one unresolved consumer choice.
runtime:
  provider: auto
  isolatedNetwork: true
  namingStrategy: workspace-resource
catalog:
  sources:
    - ../../../../../catalog/builtin
policies:
  autoWire: true
  secretSource: local
resources:
  postgres:
    template: postgres
    exports:
      - postgres
  redis:
    template: redis
    exports:
      - redis
  api:
    template: node-api
    imports:
      - contract: postgres
        from: postgres
      - contract: redis
        from: redis
    exports:
      - http
  web:
    template: vite-web
    imports:
      - contract: http
        from: api
  proxy:
    template: nginx
