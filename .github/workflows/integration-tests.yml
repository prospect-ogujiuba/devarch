name: Integration Tests

on:
  pull_request:
    paths:
      - 'api/**'

jobs:
  integration-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Run integration tests
        working-directory: api
        run: go test -tags=integration -v -count=1 -timeout=300s ./tests/integration/...
